<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Axe Vale Orchestra | Latest</title>
<link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<div class="page">
<div data-import="includes/header.html"></div>
<main class="content">

<h1>Latest</h1>
<hr/>

<section class="feed-wrap" aria-label="Facebook feed">
  <div id="fb-fallback" class="social-fallback">
    <h2>Latest updates</h2>
    <p>
      Our latest news, rehearsal updates, and concert announcements are posted on Facebook.
    </p>
    <a class="social-button"
       href="https://www.facebook.com/AxeValeOrchestra/"
       target="_blank"
       rel="noopener">
      View updates on Facebook
    </a>
  </div>

  <div id="fb-wrapper" hidden aria-hidden="true">
    <div id="fb-feed">
      <div class="fb-page"
           data-href="https://www.facebook.com/AxeValeOrchestra/"
           data-tabs="timeline"
           data-width="500"
           data-height="900"
           data-small-header="false"
           data-adapt-container-width="true"
           data-hide-cover="false"
           data-show-facepile="true">
        <blockquote cite="https://www.facebook.com/AxeValeOrchestra/" class="fb-xfbml-parse-ignore">
          <a href="https://www.facebook.com/AxeValeOrchestra/">Axe Vale Orchestra</a>
        </blockquote>
      </div>
    </div>
  </div>
</section>

<script>
  (function () {
    const fallback = document.getElementById('fb-fallback');
    const wrapper = document.getElementById('fb-wrapper');
    const feed = document.getElementById('fb-feed');

    function showFallback() {
      wrapper.hidden = true;
      wrapper.setAttribute('aria-hidden', 'true');
      fallback.hidden = false;
    }

    function showFeed() {
      fallback.hidden = true;
      wrapper.hidden = false;
      wrapper.setAttribute('aria-hidden', 'false');
    }

    function hasRenderedFacebookWidget() {
      return !!feed.querySelector('iframe');
    }

    function checkForRenderedWidget() {
      if (hasRenderedFacebookWidget()) {
        showFeed();
        return true;
      }
      return false;
    }

    showFallback();

    window.fbAsyncInit = function () {
      if (!window.FB || !window.FB.XFBML) {
        showFallback();
        return;
      }

      window.FB.XFBML.parse(feed);

      let tries = 0;
      const maxTries = 20;
      const interval = setInterval(() => {
        tries += 1;

        if (checkForRenderedWidget() || tries >= maxTries) {
          clearInterval(interval);
          if (!hasRenderedFacebookWidget()) {
            showFallback();
          }
        }
      }, 300);
    };

    setTimeout(showFallback, 7000);
  })();
</script>

<script async defer crossorigin="anonymous"
  src="https://connect.facebook.net/en_GB/sdk.js#xfbml=1&version=v23.0"></script>

</main>
<div data-import="includes/footer.html"></div>
</div>
<script src="js/import.js"></script>
</body>
</html>
