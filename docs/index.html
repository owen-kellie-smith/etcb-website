<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Axe Vale Orchestra | Latest</title>
<link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<div class="page">
<div data-import="includes/header.html"></div>
<main class="content">

<h1>Latest</h1>
<hr/>

<section class="feed-wrap" aria-label="Facebook feed">
  <div id="fb-fallback" class="social-fallback">
    <div class="social-fallback-hero" aria-hidden="true">
    <img
      class="social-fallback-image"
      alt="Axe Vale Orchestra updates are available on Facebook"
      src="img/teaser.jpg"/>
    </div>
    <h2>Latest updates</h2>
    <p>
      Our latest news, rehearsal updates, and concert announcements are posted on Facebook.
    </p>
    <a class="social-button"
       href="https://www.facebook.com/AxeValeOrchestra/"
       target="_blank"
       rel="noopener">
      View updates on Facebook
    </a>
  </div>

  <div id="fb-wrapper" hidden aria-hidden="true">
    <h2>Recent posts</h2>
    <div id="fb-feed"></div>
  </div>

  <noscript>
    <div class="social-fallback social-fallback-noscript">
      <h2>Latest updates</h2>
      <p>JavaScript is turned off, so the Facebook feed cannot be shown here.</p>
      <a class="social-button"
         href="https://www.facebook.com/AxeValeOrchestra/"
         target="_blank"
         rel="noopener">
        View updates on Facebook
      </a>
    </div>
  </noscript>
</section>

<script>
  (function () {
    const pageUrl = 'https://www.facebook.com/AxeValeOrchestra/';
    const fallback = document.getElementById('fb-fallback');
    const wrapper = document.getElementById('fb-wrapper');
    const feed = document.getElementById('fb-feed');

    if (!fallback || !wrapper || !feed) {
      return;
    }

    let finished = false;
    let pollTimer = null;
    let fallbackTimer = null;
    let observer = null;

    function cleanup() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
      if (fallbackTimer) {
        clearTimeout(fallbackTimer);
        fallbackTimer = null;
      }
      if (observer) {
        observer.disconnect();
        observer = null;
      }
    }

    function showFallback() {
      if (finished) {
        return;
      }
      finished = true;
      cleanup();
      feed.innerHTML = '';
      wrapper.hidden = true;
      wrapper.setAttribute('aria-hidden', 'true');
      fallback.hidden = false;
    }

    function showFeed() {
      if (finished) {
        return;
      }
      finished = true;
      cleanup();
      fallback.hidden = true;
      wrapper.hidden = false;
      wrapper.setAttribute('aria-hidden', 'false');
    }

    function hasRenderedWidget() {
      return !!feed.querySelector('iframe, span iframe, .fb_iframe_widget iframe');
    }

    function injectFacebookMarkup() {
      feed.innerHTML = '' +
        '<div class="fb-page"' +
        ' data-href="' + pageUrl + '"' +
        ' data-tabs="timeline"' +
        ' data-width="500"' +
        ' data-height="900"' +
        ' data-small-header="false"' +
        ' data-adapt-container-width="true"' +
        ' data-hide-cover="false"' +
        ' data-show-facepile="false">' +
          '<blockquote cite="' + pageUrl + '" class="fb-xfbml-parse-ignore">' +
            '<a href="' + pageUrl + '">Axe Vale Orchestra</a>' +
          '</blockquote>' +
        '</div>';
    }

    function watchForWidget() {
      observer = new MutationObserver(function () {
        if (hasRenderedWidget()) {
          showFeed();
        }
      });
      observer.observe(feed, { childList: true, subtree: true });

      let tries = 0;
      pollTimer = setInterval(function () {
        tries += 1;
        if (hasRenderedWidget()) {
          showFeed();
        } else if (tries >= 20) {
          showFallback();
        }
      }, 300);
    }

    function handleFacebookReady() {
      if (!window.FB || !window.FB.XFBML || typeof window.FB.XFBML.parse !== 'function') {
        showFallback();
        return;
      }

      injectFacebookMarkup();

      try {
        window.FB.XFBML.parse(feed, function () {
          if (hasRenderedWidget()) {
            showFeed();
          }
        });
      } catch (error) {
        showFallback();
        return;
      }

      watchForWidget();
    }

    function loadFacebookSDK() {
      const existing = document.getElementById('facebook-jssdk');
      if (existing) {
        return;
      }

      const sdk = document.createElement('script');
      sdk.id = 'facebook-jssdk';
      sdk.async = true;
      sdk.defer = true;
      sdk.crossOrigin = 'anonymous';
      sdk.src = 'https://connect.facebook.net/en_GB/sdk.js#xfbml=1&version=v23.0';
      sdk.onerror = showFallback;
      document.body.appendChild(sdk);
    }

    fallback.hidden = false;
    wrapper.hidden = true;
    wrapper.setAttribute('aria-hidden', 'true');

    window.fbAsyncInit = handleFacebookReady;
    loadFacebookSDK();
    fallbackTimer = setTimeout(showFallback, 4500);
  })();
</script>

</main>
<div data-import="includes/footer.html"></div>
</div>
<script src="js/import.js"></script>
</body>
</html>
