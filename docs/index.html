<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Axe Vale Orchestra | Latest</title>
<link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<div class="page">
<div data-import="includes/header.html"></div>
<main class="content" id="main-content"></main>
<div data-import="includes/footer.html"></div>
</div>
<template id="page-latest">

<h1>Latest</h1>
<hr/>

<section class="feed-wrap" aria-label="Facebook feed">
  <div id="fb-fallback" class="social-fallback">
    <div class="social-fallback-image" aria-hidden="true">
      <svg viewBox="0 0 1000 520" role="img" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="fallback-gradient" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#f5f7fb"></stop>
            <stop offset="100%" stop-color="#dfe8f7"></stop>
          </linearGradient>
        </defs>
        <rect width="1000" height="520" fill="url(#fallback-gradient)"></rect>
        <rect x="62" y="52" width="876" height="416" rx="26" fill="#ffffff" stroke="#d7deea" stroke-width="4"></rect>
        <circle cx="170" cy="160" r="54" fill="#1877f2"></circle>
        <text x="170" y="178" text-anchor="middle" font-size="76" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="white">f</text>
        <text x="260" y="146" font-size="44" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#222">Latest Facebook updates</text>
        <text x="260" y="196" font-size="28" font-family="Arial, Helvetica, sans-serif" fill="#555">Open our Facebook page to see rehearsal news and concert announcements.</text>
        <rect x="112" y="260" width="776" height="26" rx="13" fill="#eef2f8"></rect>
        <rect x="112" y="312" width="682" height="26" rx="13" fill="#eef2f8"></rect>
        <rect x="112" y="364" width="732" height="26" rx="13" fill="#eef2f8"></rect>
      </svg>
    </div>
    <h2>Latest updates</h2>
    <p>
      Our latest news, rehearsal updates, and concert announcements are posted on Facebook.
    </p>
    <a class="social-button"
       href="https://www.facebook.com/AxeValeOrchestra/"
       target="_blank"
       rel="noopener">
      View updates on Facebook
    </a>
  </div>

  <div id="fb-wrapper" hidden aria-hidden="true">
    <h2>Recent posts</h2>
    <div id="fb-feed"></div>
  </div>

  <noscript>
    <div class="social-fallback">
      <div class="social-fallback-image" aria-hidden="true">
        <svg viewBox="0 0 1000 520" role="img" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="fallback-gradient-noscript" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#f5f7fb"></stop>
              <stop offset="100%" stop-color="#dfe8f7"></stop>
            </linearGradient>
          </defs>
          <rect width="1000" height="520" fill="url(#fallback-gradient-noscript)"></rect>
          <rect x="62" y="52" width="876" height="416" rx="26" fill="#ffffff" stroke="#d7deea" stroke-width="4"></rect>
          <circle cx="170" cy="160" r="54" fill="#1877f2"></circle>
          <text x="170" y="178" text-anchor="middle" font-size="76" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="white">f</text>
          <text x="260" y="146" font-size="44" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#222">Latest Facebook updates</text>
          <text x="260" y="196" font-size="28" font-family="Arial, Helvetica, sans-serif" fill="#555">Open our Facebook page to see rehearsal news and concert announcements.</text>
          <rect x="112" y="260" width="776" height="26" rx="13" fill="#eef2f8"></rect>
          <rect x="112" y="312" width="682" height="26" rx="13" fill="#eef2f8"></rect>
          <rect x="112" y="364" width="732" height="26" rx="13" fill="#eef2f8"></rect>
        </svg>
      </div>
      <h2>Latest updates</h2>
      <p>
        Our latest news, rehearsal updates, and concert announcements are posted on Facebook.
      </p>
      <a class="social-button"
         href="https://www.facebook.com/AxeValeOrchestra/"
         target="_blank"
         rel="noopener">
        View updates on Facebook
      </a>
    </div>
  </noscript>
</section>

<script>
  (function () {
    const pageUrl = 'https://www.facebook.com/AxeValeOrchestra/';
    const fallback = document.getElementById('fb-fallback');
    const wrapper = document.getElementById('fb-wrapper');
    const feed = document.getElementById('fb-feed');

    let resolved = false;
    let pollTimer = null;
    let fallbackTimer = null;

    function clearTimers() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
      if (fallbackTimer) {
        clearTimeout(fallbackTimer);
        fallbackTimer = null;
      }
    }

    function showFallback() {
      clearTimers();
      resolved = true;
      feed.innerHTML = '';
      wrapper.hidden = true;
      wrapper.setAttribute('aria-hidden', 'true');
      fallback.hidden = false;
    }

    function showFeed() {
      clearTimers();
      resolved = true;
      fallback.hidden = true;
      wrapper.hidden = false;
      wrapper.setAttribute('aria-hidden', 'false');
    }

    function hasRenderedWidget() {
      return !!(
        feed.querySelector('iframe') ||
        feed.querySelector('[title*="Facebook"]') ||
        feed.querySelector('.fb_iframe_widget')
      );
    }

    function injectFacebookMarkup() {
      feed.innerHTML =
        '<div class="fb-page"' +
          ' data-href="' + pageUrl + '"' +
          ' data-tabs="timeline"' +
          ' data-width="500"' +
          ' data-height="900"' +
          ' data-small-header="false"' +
          ' data-adapt-container-width="true"' +
          ' data-hide-cover="false"' +
          ' data-show-facepile="false">' +
            '<blockquote cite="' + pageUrl + '" class="fb-xfbml-parse-ignore">' +
              '<a href="' + pageUrl + '">Axe Vale Orchestra</a>' +
            '</blockquote>' +
        '</div>';
    }

    function startPollingForWidget() {
      let tries = 0;
      pollTimer = setInterval(function () {
        tries += 1;

        if (hasRenderedWidget()) {
          showFeed();
        } else if (tries >= 20 && !resolved) {
          showFallback();
        }
      }, 300);
    }

    function handleFacebookReady() {
      if (!window.FB || !window.FB.XFBML) {
        showFallback();
        return;
      }

      injectFacebookMarkup();

      try {
        window.FB.XFBML.parse(feed, function () {
          if (hasRenderedWidget()) {
            showFeed();
          }
        });
      } catch (error) {
        showFallback();
        return;
      }

      startPollingForWidget();
    }

    function loadFacebookSDK() {
      if (document.getElementById('facebook-jssdk')) {
        return;
      }

      const sdk = document.createElement('script');
      sdk.id = 'facebook-jssdk';
      sdk.async = true;
      sdk.defer = true;
      sdk.crossOrigin = 'anonymous';
      sdk.src = 'https://connect.facebook.net/en_GB/sdk.js#xfbml=1&version=v23.0';
      sdk.onerror = function () {
        showFallback();
      };
      document.body.appendChild(sdk);
    }

    showFallback();
    resolved = false;
    window.__pageCleanup = function () { clearTimers(); };
    if (window.FB && window.FB.XFBML) {
      handleFacebookReady();
    } else {
      window.fbAsyncInit = handleFacebookReady;
      loadFacebookSDK();
    }
    fallbackTimer = setTimeout(function () {
      if (!resolved) {
        showFallback();
      }
    }, 4500);
  })();
</script>

</template>
<script src="js/import.js"></script>
</body>
</html>
