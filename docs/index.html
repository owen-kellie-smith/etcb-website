<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Axe Vale Orchestra | Facebook updates</title>
<link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<div class="page">
<div data-import="includes/header.html"></div>
<main class="content">

<h1>AVO on Facebook</h1>
<hr/>

      <div id="fb-root"></div>
      <script async defer crossorigin="anonymous"
        src="https://connect.facebook.net/en_GB/sdk.js#xfbml=1&version=v23.0">
      </script>

      <section class="feed-wrap" aria-label="Facebook feed">
        <div class="fb-page"
             data-href="https://www.facebook.com/AxeValeOrchestra/"
             data-tabs="timeline"
             data-width="500"
             data-height="900"
             data-small-header="false"
             data-adapt-container-width="true"
             data-hide-cover="false"
             data-show-facepile="true">
          <blockquote cite="https://www.facebook.com/AxeValeOrchestra/" class="fb-xfbml-parse-ignore">
            <a href="https://www.facebook.com/AxeValeOrchestra/">Axe Vale Orchestra</a>
          </blockquote>
        </div>
      </section>

      <br/>
      <section class="intro">
        <div class="actions">
          <a class="button primary" href="https://www.facebook.com/AxeValeOrchestra/" target="_blank" rel="noopener">AVO Facebook page</a>
        </div>
      </section>

</main>
<div data-import="includes/footer.html"></div>
</div>
<script src="js/import.js"></script>
</body>
</html>
